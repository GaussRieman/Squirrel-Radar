version: 1
intents:
  - intent: rule_diagnosis
    skill: 规则诊断技能
    keywords: ["规则", "命中", "未命中", "为什么判断", "依据", "条件"]
    instruction: "解释规则为什么命中或未命中。必须引用规则条件、执行结果和证据文本。"
    steps: ["识别规则问题", "读取规则执行日志", "提取命中证据", "生成规则解释"]
  - intent: data_explain
    skill: 数据解释技能
    keywords: ["当前值", "同比", "环比", "趋势", "分位", "指标", "是什么意思", "含义"]
    instruction: "解释指标字段、指标定义和数值含义。回答要先解释概念，再引用当前月份具体数据。"
    steps: ["识别指标问题", "读取指标数据", "解释字段口径", "引用当前数值"]
  - intent: risk_watch
    skill: 风险观察技能
    keywords: ["风险", "观察", "下个月", "下月", "关注", "预警"]
    instruction: "聚焦风险、下月观察任务和需要验证的指标，避免做具体投资建议。"
    steps: ["识别风险问题", "读取快照风险", "读取命中规则", "输出观察清单"]
  - intent: family_business
    skill: 家庭企业含义技能
    keywords: ["家庭", "资产", "企业", "经营", "现金流", "负债", "用工"]
    instruction: "只解释宏观环境对普通家庭和企业经营的含义，不给具体投资标的或收益承诺。"
    steps: ["识别应用场景", "读取居民和企业模块", "连接指标和含义", "输出非投资建议解释"]
  - intent: cycle_summary
    skill: 周期状态技能
    keywords: []
    instruction: "综合六大模块、命中规则和关键指标，形成宏观周期状态判断。"
    steps: ["识别综合问题", "读取周期快照", "读取关键指标", "生成状态摘要"]
