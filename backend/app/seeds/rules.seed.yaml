version: 1
updated_at: "2026-05-18"
rules:
  - rule_id: wide_money_weak_credit
    name: 钱宽信用弱
    category: credit
    description: 货币供应偏宽，但实体融资扩张没有同步跟上。
    observed_indicators: [m2_yoy, tsf_stock_yoy]
    logic: all
    conditions:
      - indicator: m2_yoy
        field: yoy
        operator: ">="
        value: 9.0
      - indicator: tsf_stock_yoy
        field: yoy
        operator: "<"
        value: 8.8
    triggered_status:
      module: 信用
      status: 钱宽信用弱
      severity: warning
    risk: 资金环境不紧，但实体融资需求不足，可能出现流动性宽松向增长动能传导不畅。
    evidence_template: M2同比为{m2_yoy.yoy}%，社融存量同比为{tsf_stock_yoy.yoy}%，货币与信用扩张出现背离。

  - rule_id: credit_expansion
    name: 信用扩张
    category: credit
    description: 社融和新增贷款同步改善，说明融资活动更活跃。
    observed_indicators: [tsf_stock_yoy, new_rmb_loan, enterprise_mid_long_loan]
    logic: all
    conditions:
      - indicator: tsf_stock_yoy
        field: yoy
        operator: ">="
        value: 9.2
      - indicator: new_rmb_loan
        field: percentile_24m
        operator: ">="
        value: 60
      - indicator: enterprise_mid_long_loan
        field: percentile_24m
        operator: ">="
        value: 55
    triggered_status:
      module: 信用
      status: 信用扩张
      severity: positive
    risk: 信用改善需要观察是否进入居民和民营企业部门，避免只停留在政策性或短期融资。
    evidence_template: 社融同比、总贷款和企业中长期贷款同时处在较好区间，信用扩张信号增强。

  - rule_id: credit_contraction_pressure
    name: 信用收缩压力
    category: credit
    description: 社融、贷款和居民中长期贷款均偏弱，显示信用需求不足。
    observed_indicators: [tsf_stock_yoy, new_rmb_loan, household_mid_long_loan]
    logic: all
    conditions:
      - indicator: tsf_stock_yoy
        field: yoy
        operator: "<"
        value: 8.5
      - indicator: new_rmb_loan
        field: percentile_24m
        operator: "<"
        value: 35
      - indicator: household_mid_long_loan
        field: yoy
        operator: "<"
        value: 0
    triggered_status:
      module: 信用
      status: 信用收缩压力
      severity: warning
    risk: 融资需求偏弱可能拖累投资、消费和房地产修复节奏。
    evidence_template: 社融同比偏低，新增贷款分位不高，居民中长期贷款同比仍弱。

  - rule_id: household_defensive
    name: 居民防御状态
    category: household
    description: 居民长期借款意愿弱，收入修复也不强。
    observed_indicators: [household_mid_long_loan, wage_income]
    logic: all
    conditions:
      - indicator: household_mid_long_loan
        field: yoy
        operator: "<"
        value: 0
      - indicator: wage_income
        field: yoy
        operator: "<"
        value: 5.5
    triggered_status:
      module: 居民
      status: 居民防御状态
      severity: caution
    risk: 居民可能倾向少借钱、少买房、增加储蓄，消费和地产需求修复受限。
    evidence_template: 居民中长期贷款同比为{household_mid_long_loan.yoy}%，工资性收入同比为{wage_income.yoy}%。

  - rule_id: household_confidence_repair
    name: 居民信心修复
    category: household
    description: 居民收入和中长期贷款同步改善。
    observed_indicators: [household_mid_long_loan, wage_income, core_cpi]
    logic: all
    conditions:
      - indicator: household_mid_long_loan
        field: yoy
        operator: ">="
        value: 0
      - indicator: wage_income
        field: yoy
        operator: ">="
        value: 5.5
      - indicator: core_cpi
        field: yoy
        operator: ">="
        value: 0.8
    triggered_status:
      module: 居民
      status: 居民信心修复
      severity: positive
    risk: 信心修复仍需持续性确认，单月贷款改善可能受季节性扰动。
    evidence_template: 居民贷款、工资收入和核心CPI同时改善，居民部门风险偏好有所恢复。

  - rule_id: household_income_pressure
    name: 居民收入压力
    category: household
    description: 工资性收入偏低，核心消费价格也偏弱。
    observed_indicators: [wage_income, core_cpi]
    logic: all
    conditions:
      - indicator: wage_income
        field: yoy
        operator: "<"
        value: 4.8
      - indicator: core_cpi
        field: yoy
        operator: "<"
        value: 0.7
    triggered_status:
      module: 居民
      status: 收入和消费偏弱
      severity: caution
    risk: 居民现金流和消费需求偏弱，可能压制内需恢复。
    evidence_template: 工资性收入和核心CPI同时偏低，居民消费温度不足。

  - rule_id: property_bottom_unconfirmed
    name: 房地产未确认见底
    category: property
    description: 房价环比仍下跌，销售面积同比也未转正。
    observed_indicators: [secondhand_home_price_mom_70c, commodity_house_sales_area]
    logic: all
    conditions:
      - indicator: secondhand_home_price_mom_70c
        field: mom
        operator: "<"
        value: 0
      - indicator: commodity_house_sales_area
        field: yoy
        operator: "<"
        value: 0
    triggered_status:
      module: 房地产
      status: 房地产未确认见底
      severity: warning
    risk: 量价都未企稳时，房地产链条和居民资产预期仍可能承压。
    evidence_template: 70城二手房价格环比为{secondhand_home_price_mom_70c.mom}%，商品房销售面积同比为{commodity_house_sales_area.yoy}%。

  - rule_id: property_initial_stabilization
    name: 房地产初步企稳
    category: property
    description: 房价跌幅收敛或转正，销售面积改善，居民中长期贷款不再恶化。
    observed_indicators: [secondhand_home_price_mom_70c, commodity_house_sales_area, household_mid_long_loan]
    logic: all
    conditions:
      - indicator: secondhand_home_price_mom_70c
        field: mom
        operator: ">="
        value: 0
      - indicator: commodity_house_sales_area
        field: yoy
        operator: ">="
        value: -2
      - indicator: household_mid_long_loan
        field: yoy
        operator: ">="
        value: 0
    triggered_status:
      module: 房地产
      status: 房地产初步企稳
      severity: positive
    risk: 初步企稳不等于趋势反转，仍需连续数月量价和贷款数据确认。
    evidence_template: 房价环比、销售面积和居民中长期贷款同时边际改善。

  - rule_id: property_volume_price_divergence
    name: 房地产量价背离
    category: property
    description: 销售边际改善但价格仍下跌，说明预期尚未完全修复。
    observed_indicators: [secondhand_home_price_mom_70c, commodity_house_sales_area]
    logic: all
    conditions:
      - indicator: commodity_house_sales_area
        field: yoy
        operator: ">="
        value: -2
      - indicator: secondhand_home_price_mom_70c
        field: mom
        operator: "<"
        value: 0
    triggered_status:
      module: 房地产
      status: 量价背离
      severity: caution
    risk: 成交改善若依赖降价换量，房地产预期仍不稳。
    evidence_template: 商品房销售面积改善，但二手房价格环比仍为负。

  - rule_id: property_downward_pressure
    name: 房地产下行压力
    category: property
    description: 销售面积大幅下滑，房价继续下跌，居民贷款偏弱。
    observed_indicators: [commodity_house_sales_area, secondhand_home_price_mom_70c, household_mid_long_loan]
    logic: all
    conditions:
      - indicator: commodity_house_sales_area
        field: yoy
        operator: "<"
        value: -10
      - indicator: secondhand_home_price_mom_70c
        field: mom
        operator: "<"
        value: -0.3
      - indicator: household_mid_long_loan
        field: yoy
        operator: "<"
        value: 0
    triggered_status:
      module: 房地产
      status: 房地产下行压力
      severity: warning
    risk: 房地产需求、价格和居民加杠杆意愿同时偏弱，可能拖累相关产业链。
    evidence_template: 销售、价格和居民中长期贷款同时走弱，房地产压力仍集中。

  - rule_id: enterprise_wait_and_see
    name: 企业观望
    category: enterprise
    description: 民间投资偏弱，利润改善不足。
    observed_indicators: [private_investment, industrial_profit]
    logic: all
    conditions:
      - indicator: private_investment
        field: yoy
        operator: "<"
        value: 0
      - indicator: industrial_profit
        field: yoy
        operator: "<"
        value: 5
    triggered_status:
      module: 企业
      status: 企业观望
      severity: caution
    risk: 企业扩张意愿不足，可能影响投资、就业和后续收入修复。
    evidence_template: 民间投资同比为{private_investment.yoy}%，工业企业利润同比为{industrial_profit.yoy}%。

  - rule_id: enterprise_expansion
    name: 企业扩张
    category: enterprise
    description: 企业中长期贷款、民间投资和利润同步改善。
    observed_indicators: [enterprise_mid_long_loan, private_investment, industrial_profit]
    logic: all
    conditions:
      - indicator: enterprise_mid_long_loan
        field: percentile_24m
        operator: ">="
        value: 60
      - indicator: private_investment
        field: yoy
        operator: ">="
        value: 2
      - indicator: industrial_profit
        field: yoy
        operator: ">="
        value: 8
    triggered_status:
      module: 企业
      status: 企业扩张
      severity: positive
    risk: 企业扩张需要需求端配合，若价格和消费偏弱，扩张持续性仍需观察。
    evidence_template: 企业贷款、民间投资和工业利润同时改善，企业部门扩张信号增强。

  - rule_id: profit_repair_without_investment
    name: 利润修复但投资未跟上
    category: enterprise
    description: 工业利润改善，但民间投资仍偏弱。
    observed_indicators: [industrial_profit, private_investment]
    logic: all
    conditions:
      - indicator: industrial_profit
        field: yoy
        operator: ">="
        value: 8
      - indicator: private_investment
        field: yoy
        operator: "<"
        value: 1
    triggered_status:
      module: 企业
      status: 利润修复待传导
      severity: caution
    risk: 利润改善尚未转化为资本开支，企业预期可能仍偏谨慎。
    evidence_template: 工业利润改善，但民间投资仍未明显修复。

  - rule_id: low_inflation_weak_demand
    name: 低通胀弱需求
    category: price
    description: 核心CPI和PPI都偏低，显示需求温度不足。
    observed_indicators: [core_cpi, ppi]
    logic: all
    conditions:
      - indicator: core_cpi
        field: yoy
        operator: "<"
        value: 0.8
      - indicator: ppi
        field: yoy
        operator: "<"
        value: 0
    triggered_status:
      module: 价格
      status: 低通胀弱需求
      severity: warning
    risk: 名义增长偏弱可能压制企业收入、利润和居民收入预期。
    evidence_template: 核心CPI为{core_cpi.yoy}%，PPI为{ppi.yoy}%，价格信号显示需求不足。

  - rule_id: cost_push_inflation
    name: 成本推动型通胀
    category: price
    description: PPI明显上行，但核心CPI没有同步改善。
    observed_indicators: [ppi, core_cpi, industrial_profit]
    logic: all
    conditions:
      - indicator: ppi
        field: yoy
        operator: ">="
        value: 3
      - indicator: core_cpi
        field: yoy
        operator: "<"
        value: 1.2
      - indicator: industrial_profit
        field: yoy
        operator: "<"
        value: 5
    triggered_status:
      module: 价格
      status: 成本推动型通胀
      severity: caution
    risk: 上游价格抬升但终端需求不强，企业利润可能被成本挤压。
    evidence_template: PPI较高而核心CPI和利润没有同步增强，价格上行更像成本推动。

  - rule_id: deflation_pressure
    name: 通缩压力
    category: price
    description: 核心CPI很低，PPI深度为负。
    observed_indicators: [core_cpi, ppi, industrial_profit]
    logic: all
    conditions:
      - indicator: core_cpi
        field: yoy
        operator: "<"
        value: 0.5
      - indicator: ppi
        field: yoy
        operator: "<"
        value: -2
      - indicator: industrial_profit
        field: yoy
        operator: "<"
        value: 3
    triggered_status:
      module: 价格
      status: 通缩压力
      severity: warning
    risk: 价格和利润偏弱可能形成收入预期下降、企业缩减扩张的循环。
    evidence_template: 核心CPI低位、PPI深度负增长，企业利润也偏弱。

  - rule_id: policy_put_under_money
    name: 政策托底：货币先行
    category: policy
    description: M2偏高但信用和价格仍弱，说明政策或流动性托底先行。
    observed_indicators: [m2_yoy, tsf_stock_yoy, core_cpi]
    logic: all
    conditions:
      - indicator: m2_yoy
        field: yoy
        operator: ">="
        value: 9
      - indicator: tsf_stock_yoy
        field: yoy
        operator: "<"
        value: 9
      - indicator: core_cpi
        field: yoy
        operator: "<"
        value: 0.8
    triggered_status:
      module: 政策
      status: 政策托底
      severity: neutral
    risk: 托底阶段不等于内生修复，关键在信用、价格和居民企业行为能否接上。
    evidence_template: M2较高，但社融和核心CPI仍偏弱，流动性先于需求修复。

  - rule_id: policy_put_under_credit
    name: 政策托底：信用投放
    category: policy
    description: 新增贷款较强，但居民和民间投资仍弱。
    observed_indicators: [new_rmb_loan, household_mid_long_loan, private_investment]
    logic: all
    conditions:
      - indicator: new_rmb_loan
        field: percentile_24m
        operator: ">="
        value: 65
      - indicator: household_mid_long_loan
        field: yoy
        operator: "<"
        value: 0
      - indicator: private_investment
        field: yoy
        operator: "<"
        value: 1
    triggered_status:
      module: 政策
      status: 信用托底
      severity: neutral
    risk: 总量信贷较强但居民和民企未改善，说明信用结构仍需继续观察。
    evidence_template: 新增贷款分位较高，但居民中长期贷款和民间投资仍弱。

  - rule_id: endogenous_repair
    name: 内生修复
    category: cycle
    description: 居民、企业、价格三个方向同时改善，说明修复不只依赖政策托底。
    observed_indicators: [wage_income, household_mid_long_loan, private_investment, industrial_profit, core_cpi]
    logic: all
    conditions:
      - indicator: wage_income
        field: yoy
        operator: ">="
        value: 5.5
      - indicator: household_mid_long_loan
        field: yoy
        operator: ">="
        value: 0
      - indicator: private_investment
        field: yoy
        operator: ">="
        value: 2
      - indicator: industrial_profit
        field: yoy
        operator: ">="
        value: 8
      - indicator: core_cpi
        field: yoy
        operator: ">="
        value: 0.8
    triggered_status:
      module: 周期
      status: 内生修复
      severity: positive
    risk: 内生修复需要连续性，若房地产和价格再次走弱，修复可能反复。
    evidence_template: 居民收入、居民贷款、民间投资、利润和核心CPI同时改善。

  - rule_id: broad_recovery_confirmation
    name: 广谱修复确认
    category: cycle
    description: 信用、地产、企业和价格多模块同时改善。
    observed_indicators: [tsf_stock_yoy, commodity_house_sales_area, private_investment, ppi]
    logic: all
    conditions:
      - indicator: tsf_stock_yoy
        field: yoy
        operator: ">="
        value: 9.2
      - indicator: commodity_house_sales_area
        field: yoy
        operator: ">="
        value: 0
      - indicator: private_investment
        field: yoy
        operator: ">="
        value: 2
      - indicator: ppi
        field: yoy
        operator: ">="
        value: 0
    triggered_status:
      module: 周期
      status: 广谱修复
      severity: positive
    risk: 广谱修复若伴随价格过快上行，后续政策环境可能变化，需要继续观察平衡性。
    evidence_template: 信用、地产、民间投资和工业品价格同时改善，修复范围扩大。

  - rule_id: nominal_growth_pressure
    name: 名义增长压力
    category: cycle
    description: PPI、利润和民间投资同时偏弱，名义增长修复不足。
    observed_indicators: [ppi, industrial_profit, private_investment]
    logic: all
    conditions:
      - indicator: ppi
        field: yoy
        operator: "<"
        value: 0
      - indicator: industrial_profit
        field: yoy
        operator: "<"
        value: 5
      - indicator: private_investment
        field: yoy
        operator: "<"
        value: 1
    triggered_status:
      module: 周期
      status: 名义增长压力
      severity: warning
    risk: 价格、利润和投资共同偏弱，可能拖累企业现金流和就业收入传导。
    evidence_template: PPI、工业利润和民间投资均偏弱，名义增长动能不足。

  - rule_id: money_credit_price_sync
    name: 货币信用价格同步改善
    category: cycle
    description: M2、社融、核心CPI和PPI共同改善，说明宽货币可能正在传导到信用和价格。
    observed_indicators: [m2_yoy, tsf_stock_yoy, core_cpi, ppi]
    logic: all
    conditions:
      - indicator: m2_yoy
        field: yoy
        operator: ">="
        value: 8.5
      - indicator: tsf_stock_yoy
        field: yoy
        operator: ">="
        value: 9.0
      - indicator: core_cpi
        field: yoy
        operator: ">="
        value: 0.8
      - indicator: ppi
        field: yoy
        operator: ">="
        value: 0
    triggered_status:
      module: 周期
      status: 传导改善
      severity: positive
    risk: 同步改善仍需观察是否带来居民和企业行为改善，而不只是金融和价格数据改善。
    evidence_template: 货币、信用和价格指标同步回暖，宏观传导链条改善。
